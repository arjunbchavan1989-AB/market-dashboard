name: Auto-Update Market Data

on:
  schedule:
    - cron: '15 9 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy matplotlib scipy investpy

      - name: Fetch Latest Market Data & Generate Charts
        run: |
          python scripts/build_data.py --out-dir data

      - name: Commit and Push Updated Data to GitHub
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update Indian market data & charts"
          file_pattern: 'data/*'
